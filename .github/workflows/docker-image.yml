name: Docker Image CI

on:
  schedule:
    # Runs every 2 weeks on Monday at 00:00 UTC
    - cron: "0 0 */14 * *"
  workflow_dispatch:
  repository_dispatch:
    types: [build-docker]

jobs:
  # Build apache and cli images on native runners for each arch
  build_apache_and_cli:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        php_version: ['8.5', '8.4', '8.3', '8.2']
        config:
          - {dockerfile_suffix: 'apache', tag_suffix: 'latest'}
          - {dockerfile_suffix: 'cli', tag_suffix: 'cli'}
        platform:
          - {arch: amd64, runner: ubuntu-latest}
          - {arch: arm64, runner: ubuntu-24.04-arm}
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    - name: Set TAG_VERSION
      run: |
        TAG_VERSION=${{ matrix.php_version }}
        echo "TAG_VERSION=${TAG_VERSION//./}" >> $GITHUB_ENV
    - name: Build and Push
      run: |
        docker buildx build . \
          --progress=plain \
          --platform linux/${{ matrix.platform.arch }} \
          --file 8/${{ matrix.php_version }}/Dockerfile.${{ matrix.config.dockerfile_suffix }} \
          --tag ianmgg/php$TAG_VERSION:${{ matrix.config.tag_suffix }}-${{ matrix.platform.arch }} \
          --push

  # Merge arch-specific tags into multi-arch manifests
  merge_base_manifests:
    needs: build_apache_and_cli
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php_version: ['8.5', '8.4', '8.3', '8.2']
        config:
          - {tag_suffix: 'latest'}
          - {tag_suffix: 'cli'}
    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Set TAG_VERSION
      run: |
        TAG_VERSION=${{ matrix.php_version }}
        echo "TAG_VERSION=${TAG_VERSION//./}" >> $GITHUB_ENV
    - name: Create manifest
      run: |
        docker buildx imagetools create \
          --tag ianmgg/php$TAG_VERSION:${{ matrix.config.tag_suffix }} \
          ianmgg/php$TAG_VERSION:${{ matrix.config.tag_suffix }}-amd64 \
          ianmgg/php$TAG_VERSION:${{ matrix.config.tag_suffix }}-arm64

  # Build dev images on native runners
  build_dev:
    needs: merge_base_manifests
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        php_version: ['8.5', '8.4', '8.3', '8.2']
        platform:
          - {arch: amd64, runner: ubuntu-latest}
          - {arch: arm64, runner: ubuntu-24.04-arm}
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    - name: Set TAG_VERSION
      run: |
        TAG_VERSION=${{ matrix.php_version }}
        echo "TAG_VERSION=${TAG_VERSION//./}" >> $GITHUB_ENV
    - name: Build and Push
      run: |
        docker buildx build . \
          --progress=plain \
          --platform linux/${{ matrix.platform.arch }} \
          --file 8/${{ matrix.php_version }}/Dockerfile.apache.dev \
          --tag ianmgg/php$TAG_VERSION:dev-${{ matrix.platform.arch }} \
          --push

  # Merge dev arch tags into multi-arch manifests
  merge_dev_manifests:
    needs: build_dev
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php_version: ['8.5', '8.4', '8.3', '8.2']
    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Set TAG_VERSION
      run: |
        TAG_VERSION=${{ matrix.php_version }}
        echo "TAG_VERSION=${TAG_VERSION//./}" >> $GITHUB_ENV
    - name: Create manifest
      run: |
        docker buildx imagetools create \
          --tag ianmgg/php$TAG_VERSION:dev \
          ianmgg/php$TAG_VERSION:dev-amd64 \
          ianmgg/php$TAG_VERSION:dev-arm64
